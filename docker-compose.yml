
#
# .env variables
#
#
# these set the default output docker image tags
#
# ACE3_IMAGE_URL
# ACE3_PHISHKIT_MANAGER_IMAGE_URL
# ACE3_PHISHKIT_IMAGE_URL
#
# these allow you to override the default docker images
# useful if you are using some kind of a pass through docker image registry
#
# PYTHON_DOCKER_IMAGE
# MYSQL_DOCKER_IMAGE
# NGINX_DOCKER_IMAGE
# RABBITMQ_DOCKER_IMAGE
# QDRANT_DOCKER_IMAGE
# DOCKER_IN_DOCKER_IMAGE
# UBUNTU_DOCKER_IMAGE
# FLUENT_BIT_DOCKER_IMAGE
#
# password and configuration settings
# NOTE if these are not set they are auto-generated
#
# SAQ_ENC (primary encryption password)
# ACE_API_KEY (api key for node-to-node communication)
# ACE_DB_USER_PASSWORD (password for the ace-user database user)
# ACE_SUPERUSER_DB_USER_PASSWORD (password for the ace-superuser database user)
# REDIS_PASSWORD
# RABBITMQ_PASSWORD
# QDRANT_API_KEY
# FLASK_SECRET_KEY (used by flask to encrypt and verify session data)
#
# host name overrides if services are running on different hosts
# ACE_DB_HOST
# ACE_DB_READONLY_HOST
# RABBITMQ_HOSTNAME
# REDIS_HOSTNAME
# QDRANT_HOSTNAME
#
# configuration options
# SAQ_CONFIG_PATHS
# SAQ_USER_ID
# SAQ_GROUP_ID
#
# BUILD_TYPE: development | production (default: development)
#

x-common-env: &common-env
  PYTHONUTF8: "1"
  LANG: C.UTF-8
  SAQ_ENC: ${SAQ_ENC:-test}
  SAQ_CONFIG_PATHS: ${SAQ_CONFIG_PATHS:-}
  ACE_INSTANCE_TYPE: DEV # possible values: DEV, QA, PRODUCTION
  # if this node is the primary node, set this value to 1, otherwise set it to 0
  # in a standalone deployment, this should be set to 1
  ACE_IS_PRIMARY_NODE: ${ACE_IS_PRIMARY_NODE:-1}
  # if your primary database has a different hostname, you will need to pass it in as ACE_DB_HOST
  ACE_DB_HOST: ${ACE_DB_HOST:-ace-db}
  ACE_DB_READONLY_HOST: ${ACE_DB_READONLY_HOST:-ace-db-readonly}
  ACE_DB_USER_PASSWORD: ${ACE_DB_USER_PASSWORD:-}
  ACE_SUPERUSER_DB_USER_PASSWORD: ${ACE_SUPERUSER_DB_USER_PASSWORD:-}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-}
  QDRANT_API_KEY: ${QDRANT_API_KEY:-}
  ACE_API_KEY: ${ACE_API_KEY:-}
  FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-}
  AWS_REGION:

x-common-volumes: &common-volumes
  - .:/opt/ace
  # NOTE your ssh keys are mounted read-only in all containers
  - ~/.ssh:/home/ace/.ssh:ro
  - ace-data:/opt/ace/data
  - ace-sql:/docker-entrypoint-initdb.d
  - ace-sql-readonly:/ace-sql-readonly
  - ace-auth:/auth
  - ace-user-home:/home/ace
  - ./ssl:/opt/ace/ssl
  - ace-phishkit:/phishkit
  - ace-js-deobfuscator:/js-deobfuscator
  - ./signatures:/opt/ace/signatures
  - type: tmpfs
    target: /tmp

services:

  # ensures file permissions on named volumes are correct
  ace-root-volume-initialize:
    platform: linux/amd64
    environment: *common-env
    user: root
    build:
      context: .
      args:
        PYTHON_DOCKER_IMAGE: ${PYTHON_DOCKER_IMAGE:-python:3.14-trixie}
        SAQ_USER_ID: ${SAQ_USER_ID:-1000}
        SAQ_GROUP_ID: ${SAQ_GROUP_ID:-1000}
        BUILD_TYPE: ${BUILD_TYPE:-development}
    image: ${ACE3_IMAGE_URL:-ace3:latest}
    command: /bin/bash -c "/opt/ace/docker/startup/initialize_volumes.sh"
    volumes:
      - .:/opt/ace
      - ace-data:/opt/ace/data
      - ace-sql:/docker-entrypoint-initdb.d
      - ace-sql-readonly:/ace-sql-readonly
      - ./ssl:/opt/ace/ssl
      - ace-auth:/auth
      - ace-phishkit:/phishkit
      - ace-js-deobfuscator:/js-deobfuscator
      - ./signatures:/opt/ace/signatures
    cap_add:
      - SYS_PTRACE
    networks:
      - ace

  fluent-bit:
    platform: linux/amd64
    environment: *common-env
    image: ${FLUENT_BIT_DOCKER_IMAGE:-fluent/fluent-bit:latest}
    ports:
      - "24224:24224"
    restart: unless-stopped
    hostname: fluent-bit
    command: /fluent-bin/bin/fluent-bit -c /fluent-bit/etc/fluent-bit.yaml
    depends_on:
      ace-root-volume-initialize:
        condition: service_completed_successfully
    user: ${SAQ_USER_ID:-1000}:${SAQ_GROUP_ID:-1000}
    volumes:
      - ./etc/fluent-bit/fluent-bit.yaml:/fluent-bit/etc/fluent-bit.yaml:ro
      - ace-data:/data
    networks:
      - ace

  # performs all first-time initialization routines that do not require the db
  ace-initialize:
    platform: linux/amd64
    environment: *common-env
    image: ${ACE3_IMAGE_URL:-ace3:latest}
    command: /bin/bash -c "/opt/ace/docker/startup/initialize.sh"
    depends_on:
      ace-root-volume-initialize:
        condition: service_completed_successfully
    volumes: *common-volumes
    cap_add:
      - SYS_PTRACE
    hostname: ace
    networks:
      - ace

  ace-db:
    platform: linux/amd64
    image: ${MYSQL_DOCKER_IMAGE:-mysql:9.7}
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_520_ci --max-allowed-packet=1073741824
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        tag: mysql-db-primary
        fluentd-async: "true"
    healthcheck:
      test: ["CMD", "mysql", "--defaults-file=/docker-entrypoint-initdb.d/mysql_defaults", "-h", "${ACE_DB_HOST:-ace-db}", "-e", "use ace;"]
      interval: 3s
      retries: 5
      start_period: 30s
      timeout: 10s
    restart: always
    depends_on:
      ace-initialize:
        condition: service_completed_successfully
      fluent-bit:
        condition: service_started
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: 1
    volumes:
      - ace-db:/var/lib/mysql
      - ace-sql:/docker-entrypoint-initdb.d
      - ace-data:/opt/ace/data
      - ./etc/mysqld/conf.d:/etc/mysql/conf.d
      - ./ssl:/opt/ace/ssl
    ports:
      - "3306:3306"
    hostname: ${ACE_DB_HOST:-ace-db}
    networks:
      - ace

  ace-db-readonly:
    platform: linux/amd64
    image: ${MYSQL_DOCKER_IMAGE:-mysql:9.7}
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_520_ci --max-allowed-packet=1073741824
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        tag: mysql-db-readonly
        fluentd-async: "true"
    healthcheck:
      test: ["CMD", "mysql", "--defaults-file=/docker-entrypoint-initdb.d/mysql_defaults", "-h", "${ACE_DB_READONLY_HOST:-ace-db-readonly}", "-e", "use ace;"]
      interval: 3s
      retries: 5
      start_period: 30s
      timeout: 10s
    restart: always
    depends_on:
      ace-db:
        condition: service_healthy
      fluent-bit:
        condition: service_started
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: 1
    volumes:
      - ace-db-readonly:/var/lib/mysql
      - ace-sql-readonly:/docker-entrypoint-initdb.d
      - ace-data:/opt/ace/data
      - ./etc/mysqld.replica/conf.d:/etc/mysql/conf.d
      - ./ssl:/opt/ace/ssl
    ports:
      - "3307:3306"
    hostname: ${ACE_DB_READONLY_HOST:-ace-db-readonly}
    networks:
      - ace

  qdrant:
    platform: linux/amd64
    environment:
      QDRANT__SERVICE__ENABLE_TLS: 1
      QDRANT__TLS__CERT: /ssl/ace.cert.pem
      QDRANT__TLS__KEY: /ssl/ace.key.pem
    image: ${QDRANT_DOCKER_IMAGE:-qdrant/qdrant}
    hostname: ${QDRANT_HOSTNAME:-qdrant}
    entrypoint: >
      /bin/sh -c "
      export QDRANT__SERVICE__API_KEY=$(cat /auth/passwords/qdrant) && ./entrypoint.sh
      "
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        tag: qdrant
        fluentd-async: "true"
    depends_on:
      ace-setup:
        condition: service_completed_successfully
      fluent-bit:
        condition: service_started
    ports:
      - "6333"
    volumes:
      - ace-qdrant:/qdrant/storage
      - ./ssl:/ssl:ro
      - ace-auth:/auth
    networks:
      - ace

  # performs all first-time initialization routines that require the db
  ace-setup:
    platform: linux/amd64
    environment:
      <<: *common-env
      FLUENT_BIT_TAG: ace-setup
    image: ${ACE3_IMAGE_URL:-ace3:latest}
    command: /bin/bash -c "/opt/ace/docker/startup/setup.sh"
    depends_on:
      ace-db:
        condition: service_healthy
    volumes: *common-volumes
    cap_add:
      - SYS_PTRACE
    hostname: ace
    networks:
      - ace

  ace-http-external:
    platform: linux/amd64
    image: ${NGINX_DOCKER_IMAGE:-nginx:latest}
    restart: always
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        tag: nginx
        fluentd-async: "true"
    depends_on:
      - http-app
      - http-api
      - http-api-v2
      - fluent-bit
    volumes:
      - ./etc/nginx/conf.d.external:/etc/nginx/conf.d:ro
      - ./app/static:/opt/ace/app/static:ro
      - ./ssl:/opt/ace/ssl:ro
    hostname: ace-http-external
    ports:
      - "9443:443"
    networks:
      - ace

  ace-http:
    platform: linux/amd64
    image: ${NGINX_DOCKER_IMAGE:-nginx:latest}
    restart: always
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        tag: nginx
        fluentd-async: "true"
    depends_on:
      - http-app
      - http-api
      - http-api-v2
      - fluent-bit
    volumes:
      - ./etc/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./app/static:/opt/ace/app/static:ro
      - ./ssl:/opt/ace/ssl:ro
    hostname: ace-http
    ports:
      - "8443:443"
    networks:
      - ace

  http-app:
    platform: linux/amd64
    environment:
      <<: *common-env
      ACE_LOG_CONFIG_PATH: etc/logging_configs/ace_logging.yaml
      FLUENT_BIT_TAG: ace-app
    image: ${ACE3_IMAGE_URL:-ace3:latest}
    depends_on:
      - ace
    command: /bin/bash -c "/opt/ace/docker/startup/start.sh uwsgi --yaml etc/uwsgi_app.yaml"
    restart: always
    volumes: *common-volumes
    hostname: ace
    expose:
      - "3030"
    cap_add:
      - SYS_PTRACE
    networks:
      - ace

  http-api:
    platform: linux/amd64
    environment:
      <<: *common-env
      ACE_LOG_CONFIG_PATH: etc/logging_configs/ace_logging.yaml
      FLUENT_BIT_TAG: ace-api
    image: ${ACE3_IMAGE_URL:-ace3:latest}
    depends_on:
      - ace
    command: /bin/bash -c "/opt/ace/docker/startup/start.sh uwsgi --yaml etc/uwsgi_api.yaml"
    restart: always
    volumes: *common-volumes
    hostname: ace
    expose:
      - "3031"
    cap_add:
      - SYS_PTRACE
    networks:
      - ace

  http-api-v2:
    platform: linux/amd64
    environment:
      <<: *common-env
      ACE_LOG_CONFIG_PATH: etc/logging_configs/ace_logging.yaml
      FLUENT_BIT_TAG: ace-api-v2
    image: ${ACE3_IMAGE_URL:-ace3:latest}
    depends_on:
      - ace
    command: /bin/bash -c "/opt/ace/docker/startup/start.sh uvicorn api_uvicorn:application --host 0.0.0.0 --port 3032 --workers 12 --timeout-keep-alive 300"
    restart: always
    volumes: *common-volumes
    hostname: ace
    expose:
      - "3032"
    cap_add:
      - SYS_PTRACE
    networks:
      - ace

  redis:
    platform: linux/amd64
    image: ${REDIS_DOCKER_IMAGE:-redis:latest}
    ports:
      - "6379:6379"
    restart: always
    hostname: ${REDIS_HOSTNAME:-redis}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        tag: redis
        fluentd-async: "true"
    depends_on:
      ace-setup:
        condition: service_completed_successfully
      fluent-bit:
        condition: service_started
    # here we're loading the redis.conf that is built from the ace-setup container
    command: ["redis-server", "/auth/etc/redis/redis.conf"]
    volumes:
      - ace-auth:/auth
    networks:
      - ace

  http-debug:
    platform: linux/amd64
    environment:
      <<: *common-env
      ACE_LOG_CONFIG_PATH: etc/logging_configs/ace_logging.yaml
      FLUENT_BIT_TAG: ace-debug
    image: ${ACE3_IMAGE_URL:-ace3:latest}
    depends_on:
      - ace
    command: /bin/bash -c "/opt/ace/docker/startup/start.sh ace start-gui"
    restart: always
    volumes: *common-volumes
    hostname: ace
    ports:
      - "5000:5000"
    cap_add:
      - SYS_PTRACE
    networks:
      - ace

  network-semaphore:
    platform: linux/amd64
    environment:
      <<: *common-env
      ACE_LOG_CONFIG_PATH: etc/logging_configs/ace_logging.yaml
      FLUENT_BIT_TAG: ace-network-semaphore
    image: ${ACE3_IMAGE_URL:-ace3:latest}
    depends_on:
      ace-setup:
        condition: service_completed_successfully
    command: /bin/bash -c "/opt/ace/docker/startup/start.sh ace service start network_semaphore"
    restart: always
    volumes: *common-volumes
    hostname: ace
    cap_add:
      - SYS_PTRACE
    ports:
      - "53559:53559"
    networks:
      - ace

  git:
    platform: linux/amd64
    environment:
      <<: *common-env
      ACE_LOG_CONFIG_PATH: etc/logging_configs/ace_logging.yaml
      FLUENT_BIT_TAG: ace-git
    depends_on:
      - ace
    image: ${ACE3_IMAGE_URL:-ace3:latest}
    command: /bin/bash -c "/opt/ace/docker/startup/start.sh ace service start git"
    volumes: *common-volumes
    hostname: ace
    cap_add:
      - SYS_PTRACE
    networks:
      - ace

  cron:
    platform: linux/amd64
    environment:
      <<: *common-env
      ACE_LOG_CONFIG_PATH: etc/logging_configs/ace_logging.yaml
      FLUENT_BIT_TAG: ace-cron
    depends_on:
      - ace
    image: ${ACE3_IMAGE_URL:-ace3:latest}
    command: /bin/bash -c "/opt/ace/docker/startup/start.sh ace service start cron"
    volumes: *common-volumes
    hostname: ace
    cap_add:
      - SYS_PTRACE
    networks:
      - ace

  yara:
    platform: linux/amd64
    environment:
      <<: *common-env
      ACE_LOG_CONFIG_PATH: etc/logging_configs/ace_logging.yaml
      FLUENT_BIT_TAG: ace-yara
    image: ${ACE3_IMAGE_URL:-ace3:latest}
    depends_on:
      ace-setup:
        condition: service_completed_successfully
    command: /bin/bash -c "/opt/ace/docker/startup/start.sh ace service start yara"
    restart: always
    volumes: *common-volumes
    hostname: ace
    cap_add:
      - SYS_PTRACE
    networks:
      - ace

  embedding-service:
    platform: linux/amd64
    environment:
      <<: *common-env
      ACE_LOG_CONFIG_PATH: etc/logging_configs/ace_logging.yaml
      FLUENT_BIT_TAG: ace-embedding-service
    image: ${ACE3_IMAGE_URL:-ace3:latest}
    depends_on:
      ace:
        condition: service_started
      redis:
        condition: service_started
    command: /bin/bash -c "/opt/ace/docker/startup/start.sh ace service start llm_embedding"
    restart: always
    volumes: *common-volumes
    hostname: ace
    cap_add:
      - SYS_PTRACE
    networks:
      - ace

  remediation:
    platform: linux/amd64
    environment:
      <<: *common-env
      ACE_LOG_CONFIG_PATH: etc/logging_configs/ace_logging.yaml
      FLUENT_BIT_TAG: ace-remediation
    image: ${ACE3_IMAGE_URL:-ace3:latest}
    depends_on:
      ace:
        condition: service_started
    command: /bin/bash -c "/opt/ace/docker/startup/start.sh ace service start remediation"
    restart: always
    volumes: *common-volumes
    hostname: ace
    cap_add:
      - SYS_PTRACE
    networks:
      - ace

  external-remediation-check:
    platform: linux/amd64
    environment:
      <<: *common-env
      ACE_LOG_CONFIG_PATH: etc/logging_configs/ace_logging.yaml
      FLUENT_BIT_TAG: ace-external-remediation-check
    image: ${ACE3_IMAGE_URL:-ace3:latest}
    depends_on:
      ace:
        condition: service_started
    command: /bin/bash -c "/opt/ace/docker/startup/start.sh ace service start external_remediation_check"
    restart: always
    volumes: *common-volumes
    hostname: ace
    cap_add:
      - SYS_PTRACE
    networks:
      - ace

  monitoring:
    platform: linux/amd64
    environment:
      <<: *common-env
      ACE_LOG_CONFIG_PATH: etc/logging_configs/ace_logging.yaml
      FLUENT_BIT_TAG: ace-monitoring
    image: ${ACE3_IMAGE_URL:-ace3:latest}
    depends_on:
      ace:
        condition: service_started
    command: /bin/bash -c "/opt/ace/docker/startup/start.sh ace service start monitoring"
    restart: always
    volumes: *common-volumes
    hostname: ace
    cap_add:
      - SYS_PTRACE
    networks:
      - ace

  # this is the service you will attach to for development purposes
  dev:
    platform: linux/amd64
    environment: *common-env
    image: ${ACE3_IMAGE_URL:-ace3:latest}
    #depends_on:
      #ace-setup:
        #condition: service_completed_successfully
    command: /bin/bash -c "/opt/ace/docker/startup/start_nothing.sh"
    restart: always
    volumes: *common-volumes
    hostname: ace
    cap_add:
      - SYS_PTRACE
    ports:
      - "5001:5000"
    networks:
      - ace

  ace:
    platform: linux/amd64
    environment:
      <<: *common-env
      ACE_LOG_CONFIG_PATH: etc/logging_configs/ace_logging.yaml
      FLUENT_BIT_TAG: ace-engine
    image: ${ACE3_IMAGE_URL:-ace3:latest}
    depends_on:
      ace-setup:
        condition: service_completed_successfully
      yara:
        condition: service_started
      network-semaphore:
        condition: service_started
      phishkit:
        condition: service_started
      js-deobfuscator:
        condition: service_started
      qdrant:
        condition: service_started
    command: /bin/bash -c "/opt/ace/docker/startup/start.sh ace service start engine"
    restart: always
    volumes: *common-volumes
    hostname: ace
    cap_add:
      - SYS_PTRACE
    networks:
      - ace

  rabbitmq:
    platform: linux/amd64
    environment:
      RABBITMQ_DEFAULT_USER: "ace3"
    image: ${RABBITMQ_DOCKER_IMAGE:-rabbitmq}
    ports:
      - "5672:5672"
    restart: always
    hostname: ${RABBITMQ_HOSTNAME:-rabbitmq}
    entrypoint: >
      /bin/sh -c "
      export RABBITMQ_DEFAULT_PASS=$(cat /auth/passwords/rabbitmq);
      exec rabbitmq-server
      "
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        tag: rabbitmq
        fluentd-async: "true"
    depends_on:
      ace-setup:
        condition: service_completed_successfully
      fluent-bit:
        condition: service_started
    volumes:
      - ./etc/rabbitmq/conf.d/20-logging.conf:/etc/rabbitmq/conf.d/20-logging.conf:ro
      - ./etc/rabbitmq/conf.d/30-deprecated-features.conf:/etc/rabbitmq/conf.d/30-deprecated-features.conf:ro
      - ace-auth:/auth
    networks:
      - ace

  phishkit-init:
    platform: linux/amd64
    build:
      context: .
      dockerfile: phishkit/Dockerfile.phishkit
      args:
        UBUNTU_DOCKER_IMAGE: ${UBUNTU_DOCKER_IMAGE:-ubuntu:22.04}
    image: ${ACE3_PHISHKIT_IMAGE_URL:-phishkit:latest}
    # this is here just to build the image
    entrypoint: /bin/true

  phishkit:
    platform: linux/amd64
    environment:
      ACE3_PHISHKIT_IMAGE_URL: ${ACE3_PHISHKIT_IMAGE_URL:-phishkit:latest}
    hostname: phishkit
    build:
      context: .
      dockerfile: phishkit/Dockerfile
      args:
        DOCKER_IN_DOCKER_IMAGE: ${DOCKER_IN_DOCKER_IMAGE:-docker:dind}
    image: ${ACE3_PHISHKIT_MANAGER_IMAGE_URL:-phishkit-manager:latest}
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        tag: phishkit
        fluentd-async: "true"
    depends_on:
      phishkit-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      fluent-bit:
        condition: service_started
    volumes:
      # this is needed so that this container can create other containers
      - /var/run/docker.sock:/var/run/docker.sock
      # this volume is used to share the downloaded data between the child containers and this one
      - ace-phishkit:/phishkit
      # this volume contains authentication information
      - ace-auth:/auth
      - ./etc:/opt/ace/etc:ro
      # signatures volume so phishkit manager can read analyst-data config files
      - ./signatures:/opt/ace/signatures:ro
    networks:
      - ace

  js-deobfuscator-init:
    platform: linux/amd64
    build:
      context: .
      dockerfile: js_deobfuscator/Dockerfile.js_deobfuscator
      args:
        NODE_DOCKER_IMAGE: ${NODE_DOCKER_IMAGE:-node:26-alpine}
    image: ${ACE3_JS_DEOBFUSCATOR_IMAGE_URL:-js-deobfuscator:latest}
    # this is here just to build the scanner image
    entrypoint: /bin/true

  js-deobfuscator:
    platform: linux/amd64
    environment:
      ACE3_JS_DEOBFUSCATOR_IMAGE_URL: ${ACE3_JS_DEOBFUSCATOR_IMAGE_URL:-js-deobfuscator:latest}
    hostname: js-deobfuscator
    build:
      context: .
      dockerfile: js_deobfuscator/Dockerfile
      args:
        DOCKER_IN_DOCKER_IMAGE: ${DOCKER_IN_DOCKER_IMAGE:-docker:dind}
    image: ${ACE3_JS_DEOBFUSCATOR_MANAGER_IMAGE_URL:-js-deobfuscator-manager:latest}
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        tag: js-deobfuscator
        fluentd-async: "true"
    depends_on:
      js-deobfuscator-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      fluent-bit:
        condition: service_started
    volumes:
      # needed so this container can spawn sibling scanner containers
      - /var/run/docker.sock:/var/run/docker.sock
      # shared volume for passing input files and returning output
      - ace-js-deobfuscator:/js-deobfuscator
      - ace-auth:/auth
    networks:
      - ace

