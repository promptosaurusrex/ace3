name: Check Model Drift

on:
  pull_request:
    paths:
      - 'saq/database/model.py'
      - 'alembic/ace/versions/**'
      - 'alembic/analysis_cache/versions/**'
  merge_group:

jobs:
  check-model-drift:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:9.2
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ace
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=3s
          --health-retries=10
          --health-start-period=30s
          --health-timeout=5s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up databases
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "
            ALTER DATABASE ace CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_520_ci;
            CREATE DATABASE \`analysis-result-cache\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_520_ci;
            CREATE USER 'ace-superuser'@'%' IDENTIFIED BY 'ci-password';
            GRANT ALL PRIVILEGES ON *.* TO 'ace-superuser'@'%' WITH GRANT OPTION;
            FLUSH PRIVILEGES;
          "

      - name: Install dependencies
        run: pip install -r installer/requirements.txt

      - name: Run ace migrations
        env:
          ACE_DB_HOST: 127.0.0.1
          ACE_SUPERUSER_DB_USER_PASSWORD: ci-password
          DATABASE_NAME: ace
        run: alembic -c alembic/ace.ini upgrade head

      - name: Run analysis cache migrations
        env:
          ACE_DB_HOST: 127.0.0.1
          ACE_SUPERUSER_DB_USER_PASSWORD: ci-password
          CACHE_DATABASE_NAME: analysis-result-cache
        run: alembic -c alembic/analysis_cache.ini upgrade head

      - name: Check for ace model drift
        env:
          ACE_DB_HOST: 127.0.0.1
          ACE_SUPERUSER_DB_USER_PASSWORD: ci-password
          DATABASE_NAME: ace
        run: python bin/check_model_drift.py

      - name: Check for analysis cache model drift
        env:
          ACE_DB_HOST: 127.0.0.1
          ACE_SUPERUSER_DB_USER_PASSWORD: ci-password
          CACHE_DATABASE_NAME: analysis-result-cache
        run: python bin/check_model_drift.py --database cache
