name: Check Alembic Migrations

on:
  pull_request:
    paths:
      - 'alembic/ace/versions/**'
      - 'alembic/analysis_cache/versions/**'
  merge_group:

jobs:
  check-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install alembic
      - name: Check for migration conflicts
        run: |
          set -e
          for cfg in alembic/ace.ini alembic/analysis_cache.ini; do
            echo "checking $cfg"
            heads=$(alembic -c "$cfg" heads | wc -l)
            if [ "$heads" -gt 1 ]; then
              echo "::error::Multiple Alembic migration heads detected in $cfg — the migration chain has forked."
              echo ""
              echo "Heads:"
              alembic -c "$cfg" heads
              echo ""
              echo "Branches:"
              alembic -c "$cfg" branches
              echo ""
              echo "Resolution: rebase so one migration's down_revision points to the other."
              exit 1
            fi
            echo "Migration chain OK (single head) for $cfg:"
            alembic -c "$cfg" heads
          done
