name: Check Alembic Migrations

on:
  pull_request:
    # paths:
    #   - 'alembic/versions/**'
  merge_group:

jobs:
  check-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install alembic
      - name: Check for migration conflicts
        run: |
          heads=$(alembic heads | wc -l)
          if [ "$heads" -gt 1 ]; then
            echo "::error::Multiple Alembic migration heads detected — the migration chain has forked."
            echo ""
            echo "Heads:"
            alembic heads
            echo ""
            echo "Branches:"
            alembic branches
            echo ""
            echo "Resolution: rebase so one migration's down_revision points to the other."
            exit 1
          fi
          echo "Migration chain OK (single head):"
          alembic heads
