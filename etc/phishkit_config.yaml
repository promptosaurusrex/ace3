# Extensions whose response bodies are skipped when appending sub-request
# content to dom.html after a scan completes. The scan itself still fetches
# these resources — this only controls what gets written into the DOM output.
skip_body_extensions:
  - ".apk"
  - ".avi"
  - ".css"
  - ".gif"
  - ".ico"
  - ".img"
  - ".jpeg"
  - ".jpg"
  - ".mkv"
  - ".mp4"
  - ".png"
  - ".svg"
  - ".woff2"

# URL patterns whose response bodies are skipped when appending sub-request
# content to dom.html. A match is any URL that *contains* the pattern string.
# The scan still fetches these URLs — this only prevents their bodies from
# being written into the DOM output.
skip_body_url_patterns:
  - "apple-mapkit.com"     # Part of top 10 domains by traffic usage in SmartProxy statistics
  - "assets.msn.com"
  - "bing.com/fd/"
  - "bing.com/hp/"
  - "bing.com/rewardsapp"
  - "bing.com/th?"
  - "browser.events.data.msn.com"
  - "c.pub.network"        # High bandwidth usage of week 2024-08-27
  - "cdn.flashtalking.com" # High usage 2024-09-30
  - "disney-plus.net"      # High traffic usage
  - "doubleclick.net"
  - "ggcdashboard.com"     # High bandwidth usage the week of 2024-04-15
  - "google-analytics"
  - "googleapis.com"
  - "googletagmanager.com"
  - "googletagservices.com"
  - "gstatic.com"
  - "gvt1.com"             # Google Video Transcoding cache server
  - "hd.pics"              # High bandwidth usage the week of 2024-04-08
  - "ibb.co"               # High bandwidth usage the week of 2024-04-08
  - "img-s-msn-com"
  - "m.media-amazon.com"   # High usage 2024-09-30
  - "parastorage.com"      # Part of top 10 domains by traffic usage in SmartProxy statistics
