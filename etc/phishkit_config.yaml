# Extensions whose response bodies are skipped when appending sub-request
# content to dom.html after a scan completes. The scan itself still fetches
# these resources — this only controls what gets written into the DOM output.
skip_body_extensions:
  - ".apk"
  - ".avi"
  - ".css"
  - ".gif"
  - ".ico"
  - ".img"
  - ".jpeg"
  - ".jpg"
  - ".mkv"
  - ".mp4"
  - ".png"
  - ".svg"
  - ".woff2"

# URL patterns whose response bodies are skipped when appending sub-request
# content to dom.html. A match is any URL that *contains* the pattern string.
# The scan still fetches these URLs — this only prevents their bodies from
# being written into the DOM output.
skip_body_url_patterns:
  - "apple-mapkit.com"     # Part of top 10 domains by traffic usage in SmartProxy statistics
  - "assets.msn.com"
  - "bing.com/fd/"
  - "bing.com/hp/"
  - "bing.com/rewardsapp"
  - "bing.com/th?"
  - "browser.events.data.msn.com"
  - "c.pub.network"        # High bandwidth usage of week 2024-08-27
  - "cdn.flashtalking.com" # High usage 2024-09-30
  - "disney-plus.net"      # High traffic usage
  - "doubleclick.net"
  - "ggcdashboard.com"     # High bandwidth usage the week of 2024-04-15
  - "google-analytics"
  - "googleapis.com"
  - "googletagmanager.com"
  - "googletagservices.com"
  - "gstatic.com"
  - "gvt1.com"             # Google Video Transcoding cache server
  - "hd.pics"              # High bandwidth usage the week of 2024-04-08
  - "ibb.co"               # High bandwidth usage the week of 2024-04-08
  - "img-s-msn-com"
  - "m.media-amazon.com"   # High usage 2024-09-30
  - "parastorage.com"      # Part of top 10 domains by traffic usage in SmartProxy statistics
  - "r.bing.com"
  - "redd.it"              # High bandwidth usage the week of 2024-04-08
  - "shopify.com"          # Part of top 10 domains by traffic usage in SmartProxy statistics
  - "squarespace-cdn.com"  # Part of top 10 domains by traffic usage in SmartProxy statistics
  - "squarespace.com"      # Part of top 10 domains by traffic usage in SmartProxy statistics
  - "th.bing.com"
  - "website-files.com"    # Part of top 10 domains by traffic usage in SmartProxy statistics
  - "wixstatic.com"        # Part of top 10 domains by traffic usage in SmartProxy statistics

# URL patterns that cause phishkit to refuse a scan entirely. A match is any
# URL that *contains* the pattern string (case-insensitive). Unlike
# skip_body_url_patterns (which only affects dom.html output), this blocks
# the scan itself so no PhishkitAnalysis is created for the URL.
#
# Use this to suppress scans of high-trust domains that downstream modules
# (e.g. JavaScriptDeobfuscationAnalyzer → url_extraction) pick up and tag
# with the `crawl` directive.
deny_crawl_url_patterns: []

# Bypass definitions used to detect and click through warning/challenge pages.
# Each entry has:
#   type      — label for logging
#   searches  — strings to look for in page source (any match triggers the bypass)
#   selectors — CSS selectors to try clicking (tried in order, first success wins)
#   handler   — name of a registered Python handler (instead of selectors)
#
# Use either "selectors" or "handler", not both.
# Available handler names: visual_checkbox_bypass
#
# This list replaces the built-in defaults entirely (not merged), so include
# all entries you want active.
bypasses:
  - type: "CloudFlare Phishing"
    searches:
      - "flagged as phishing"
      - "This website has been reported for potential phishing"
      - "Phishing is when a site attempts to steal sensitive"
    selectors:
      - "#cf-error-details > div.cf-section.cf-wrapper > div > div > form > button"
      - "button.cf-btn"

  - type: "Antibot"
    searches:
      - "Please complete the security check to access the website."
      - "Verify you are human by completing the action below"
      - "Verifying you are human"
      - "needs to review the security of your connection"
      - "challenges.cloudflare.com/turnstile"
    handler: "visual_checkbox_bypass"

  - type: "Fake Ivan CloudFlare"
    searches:
      - '"buttonLabel":"Verify",'
    selectors:
      - "#richEditor > div.GuidedModeInstructions__container > div > span"

# Per-handler configuration. Any bypass that references a handler name
# automatically receives that handler's config dict at runtime.
handlers:
  visual_checkbox_bypass:
    # Base64-encoded PNG images used to locate and click checkboxes on
    # challenge pages. The scanner compares these against a screenshot.
    # Add new variants for any checkbox style you want to detect
    # (CloudFlare turnstile, custom human-verification widgets, etc.).
    checkbox_pngs:
      - ""
      - ""
      - ""

    # When true, after a successful click + nav-wait the handler takes a fresh
    # screenshot and tries to match again, excluding any png index that already
    # matched on a previous iteration. Loop ends when no remaining png matches
    # or max_click_iterations is reached. Use for phishing pages that gate the
    # final content behind more than one challenge button.
    enable_multi_click: false

    # Hard cap on the number of click iterations (including the first). Only
    # consulted when enable_multi_click is true.
    max_click_iterations: 2

# Proxy fallback configuration. Controls when the scanner retries a scan
# without the proxy after detecting proxy-related failures.
# Only used by the Celery worker (phishkit.py), not by scanner.py.
#
# NOTE: Only used if proxy_fallback_to_direct is enabled in main config.
proxy_fallback:
  # Chrome network error strings that indicate a proxy failure.
  # Checked against combined stdout+stderr of the scanner process.
  error_patterns:
    - "ERR_TUNNEL_CONNECTION_FAILED"
    - "ERR_PROXY_CONNECTION_FAILED"
    - "ERR_PROXY_AUTH_FAILED"
    - "ERR_PROXY_CERTIFICATE_INVALID"

  # HTTP status codes returned by the proxy on the main page request
  # that should trigger a retry without proxy.
  proxy_status_codes:
    - 400
    - 403
    - 407
    - 500
    - 502
    - 504
    - 522

  # Whether to retry without proxy when the scanner process times out.
  retry_on_timeout: true

# Per-scan wait tuning applied by scanner.py after page load.
#
# additional_wait is a fixed minimum sleep after document.readyState=complete
# — covers deferred challenge UI injection via setTimeout(). max_network_wait
# is an *additional* cap on top of that, during which the scanner keeps
# waiting while any network request is in flight, the URL is changing, or a
# Network.* CDP event has fired recently. Exits early when all three go quiet.
#
# Total post-readyState wait is roughly (additional_wait + max_network_wait),
# so it must stay comfortably less than the outer scanner timeout
# (PhishkitAnalyzerConfig.scanner_timeout in saq/modules/phishkit.py, 15s
# default). If you raise max_network_wait, also raise scanner_timeout or the
# scanner process will be killed before the adaptive wait can complete.
scan_waits:
  additional_wait: 3
  max_network_wait: 10

# Resource limits applied to each scanner container spawned by the phishkit
# manager, plus settings for the orphan-container reaper.
# Only used by the Celery worker (phishkit.py), not by scanner.py.
resource_limits:
  # Per-container hard memory cap. --memory-swap is set equal to this value
  # so a leaking Chrome cannot escape the cap via swap.
  container_memory: "2g"

  # Per-container CPU cap (fractional values are allowed).
  container_cpus: "2.0"

  # Maximum age (seconds) a scanner container may live before the reaper
  # kills it. Must be substantially larger than scanner_timeout so a job
  # that just barely finishes in time is never race-killed. The code
  # enforces a floor of (scanner_timeout_hint * 4 + 120).
  reaper_max_age_seconds: 600

  # How often (seconds) the reaper sweeps for orphans.
  reaper_interval_seconds: 60

  # Hint used only by the reaper's max-age floor calculation. Keep in sync
  # with PhishkitAnalyzerConfig.scanner_timeout default.
  scanner_timeout_hint: 15
