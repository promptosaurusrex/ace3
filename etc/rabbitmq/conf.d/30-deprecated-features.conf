# Celery (via py-amqp) still declares its result queues with the
# transient_nonexcl_queues feature. RabbitMQ 4.x blocks that by default, which
# crash-loops the js-deobfuscator and phishkit celery consumers and surfaces
# to ACE as "js deobfuscator call failed: The operation timed out." Re-enable
# the feature until the upstream clients migrate.
deprecated_features.permit.transient_nonexcl_queues = true
deprecated_features.permit.global_qos = true
