service_yara:
  name: yara
  python_module: saq.yara_scanning_service
  python_class: YSSService
  description: Yara Scanner Service - local distributed yara scanner
  enabled: true
  # relative directory where the unix sockets for the yara scanner server are located (relative to DATA_DIR)
  socket_dir: var/yss/sockets
  # global configuration of yara rules (relative to SAQ_HOME or absolute path)
  # each subdirectory in this directory has any yara rules loaded in the scanner
  signature_dir: signatures/yara
  # how often to check the yara rules for changes (in seconds)
  update_frequency: 60
  # parameter to the socket.listen() function (how many connections to backlog)
  backlog: 50
  # the blacklist contains a list of rule names (one per line) to exclude from the results
  blacklist_path: etc/yara.blacklist
  # a directory that contains all the files that fail to scan (relative to DATA_DIR)
  scan_failure_dir: scan_failures
  # how long (in seconds) a single scan is allowed to take
  default_timeout: 10

# defines what we do with the malicious files we find
malicious_files:
  # this is where we actually store copies of the files
  malicious_dir: malicious
  # list of email accounts to send notifications to when new files are added
  malicious_alert_recipients: []

# observable groups
observable_group_internal:
  # all internal IP addresses
  define_internal_04: ipv4:10.0.0.0/8
  define_internal_05: ipv4:192.168.0.0/16
  define_internal_06: ipv4:172.16.0.0/12

observable_group_proxy: {}
observable_group_smtp: {}
observable_group_external_gateway: {}
observable_group_internal_dns: {}
observable_group_external_dns: {}

observable_group_popular_fqdn:
  define_fqdn_google: fqdn:google.com
  define_fqdn_amazon: fqdn:amazon.com
  define_fqdn_yahoo: fqdn:yahoo.com
  define_fqdn_youtube: fqdn:youtube.com

# global observable exclusions: things we never want to analyze because they are noisy, errors or stupid
observable_exclusions:
  # office365 journaling (blank user IDs)
  exclude_user: user:-
  exclude_user_unknown: user:unknown
  exclude_user_system: user:system
  # loopback
  exclude_loopback: ipv4:127.0.0.1
  # weird
  exclude_invalid_ipv4: ipv4:0.0.0.0
  # super common websites
  exclude_google: fqdn:google.com
  exclude_youtube: fqdn:youtube.com

# CUSTOM ALERTS
custom_alerts:
  # directory containing all flask views, default = app/templates/
  template_dir: app/templates/
  # ;-separated list of dirs containing all custom alert views, default = analysis/custom
  dirs: 
    - analysis/custom

# all deprecated custom_alert view definitions -- move old values here for full coverage
custom_alerts_backward_compatibility:
  # if alert_type == custom filename (ex. splunk = analysis/custom/splunk.html), it does not have to be defined here
  debug: analysis/custom/saq_debug.html
  mailbox: analysis/custom/email_alert.html

# ANALYSIS MODULES (only comments for select keys included below to preserve length)
# configuration format is as follows
# analysis_module_UNIQUE_MODULE_NAME:
#   name: unique identifier for the module
#   module: MODULE_PATH  # the module path the AnalysisModule class is located in
#   class: MODULE_CLASS
#   enabled: true | false
#   module_groups: group1,group2,...
#   exclude_UNIQUE_NAME: type:value
#   expect_UNIQUE_NAME: type:value
#   # optional parameters include file_size_limit (bytes), priority (lower goes first)

analysis_module_html_data_url_extraction:
  name: html_data_url_extraction
  python_module: saq.modules.file_analysis.html
  python_class: HTMLDataURLAnalyzer
  enabled: true
  # the maximum number of bytes to read from the file
  max_bytes: 104857600

analysis_module_html_js_extraction:
  name: html_js_extraction
  python_module: saq.modules.file_analysis.html_js_extraction
  python_class: HTMLJavaScriptExtractor
  enabled: true
  # minimum size in bytes for a script to be extracted
  min_script_size: 10
  # whether to extract inline event handlers (onclick, onload, etc.)
  extract_event_handlers: true
  # maximum size in bytes for inline event handlers
  max_event_handler_size: 8192
  # skip extraction of duplicate scripts (by SHA256 hash)
  deduplicate: true

analysis_module_onenote_extraction:
  name: onenote_extraction
  python_module: saq.modules.file_analysis.one_note
  python_class: OneNoteFileAnalyzer
  enabled: true
  # the maximum number of bytes to read from the file
  max_bytes: 104857600

analysis_module_javascript_deobfuscation:
  name: javascript_deobfuscation
  python_module: saq.modules.file_analysis.js
  python_class: JavaScriptDeobfuscationAnalyzer
  enabled: true
  # wall-clock limit (seconds) for one scanner container invocation
  scanner_timeout: 30
  # wall-clock limit (seconds) to wait on the celery manager for a result
  celery_timeout: 60

analysis_module_command_line_analyzer:
  name: command_line_analyzer
  python_module: saq.modules.command_line
  python_class: CommandLineAnalyzer
  enabled: true
  # the minimum length of a base64 encoded string to be extracted from a command line
  base64_minimum_length: 128

analysis_module_mailbox_email_analyzer:
  name: mailbox_email_analyzer
  python_module: saq.modules.email.mailbox
  python_class: MailboxEmailAnalyzer
  enabled: true
  # wide_diff: adds DIRECTIVE_TRACKED to MESSAGE_ID observables that are
  # children of the email analysis, not the file observable being analyzed
  wide_diff: true

analysis_module_email_analyzer:
  name: email_analyzer
  python_module: saq.modules.email.rfc822
  python_class: EmailAnalyzer
  enabled: true
  # relative path to the brotex custom whitelist file
  whitelist_path: etc/brotex.whitelist
  # office365 journaling will cause outbound emails to also get journaled
  # set this to no to scan outbound office365 emails
  scan_inbound_only: false
  # When only scanning inbound emails from office365, scan the following outbound emails
  # found in outbound_exceptions. Comma separated list!
  outbound_exceptions: ""

analysis_module_email_archiver:
  name: email_archiver
  python_module: saq.modules.email.archive
  python_class: EmailArchiveAction
  enabled: false
  # the directory to contain the archived emails (relative to DATA_DIR)
  archive_dir: archive/email
  # how long to keep archived emails (in days)
  expiration_days: 7

analysis_module_encrypted_archive_analyzer:
  name: encrypted_archive_analyzer
  python_module: saq.modules.email.archive
  python_class: EncryptedArchiveAnalyzer
  enabled: true

analysis_module_file_path_analysis:
  name: file_path_analysis
  python_module: saq.modules.file_path
  python_class: FilePathAnalyzer
  enabled: true

analysis_module_pcap_conversation_extraction:
  name: pcap_conversation_extraction
  python_module: saq.modules.pcap.sensor_extraction
  python_class: PcapConversationExtraction
  enabled: false
  semaphore: pcap
  # relative time capture (see -d option of the extract script)
  relative_duration: "00:01:00"
  # pcap executable path
  executable_path: bin/extract
  # custom pcap extraction configuration path for ACE
  config_path: etc/pcap_extract.ini
  # we don't want to pull pcap for internal systems (too much data)
  exclude_internal_network: observable_group:internal
  # the maximum total number of pcap files we should get for a single alert
  max_pcap_count: 2
  # the maximum size (in MB) of pcap we collect from each sensor
  max_size: 10

analysis_module_network_identifier:
  name: network_identifier
  python_module: saq.modules.asset.network_identifier
  python_class: NetworkIdentifier
  enabled: true
  # the CSV file that contains the definitions
  csv_file: data/etc/local_networks.csv

analysis_module_asset_analyzer:
  name: asset_analyzer
  python_module: saq.modules.asset.asset
  python_class: AssetAnalyzer
  enabled: false

analysis_module_netbios_analyzer:
  name: netbios_analyzer
  python_module: saq.modules.asset.netbios
  python_class: NetBIOSAnalyzer
  enabled: false
  # if this is set then the command is prefixed with ssh ssh_host so that it executes from another system
  # use this if you are in AWS and your target is inside target network
  ssh_host: ""

analysis_module_parse_url:
  name: parse_url
  # Parse URL and add FQDN and URI path observables
  python_module: saq.modules.url.parser
  python_class: ParseURLAnalyzer
  enabled: true

analysis_module_fqdn_analyzer:
  name: fqdn_analyzer
  # Add ip observables for FQDN resolutions
  python_module: saq.modules.dns
  python_class: FQDNAnalyzer
  enabled: true

analysis_module_idna_analyzer:
  name: idna_analyzer
  python_module: saq.modules.url.idna
  python_class: IDNAAnalyzer
  enabled: true

analysis_module_dns_analyzer:
  name: dns_analyzer
  python_module: saq.modules.asset.dns
  python_class: DNSAnalyzer
  enabled: true
  # if this is set then the command is prefixed with ssh ssh_host so that it executes from another system
  # use this if you are in AWS and your target is inside target network
  ssh_host: ""

analysis_module_whois_analyzer:
  name: whois_analyzer
  python_module: saq.modules.whois
  python_class: WhoisAnalyzer
  enabled: true

analysis_module_nrd_analyzer:
  name: nrd_analyzer
  python_module: saq.modules.nrd
  python_class: NRDAnalyzer
  enabled: true

analysis_module_active_directory_analyzer:
  name: active_directory_analyzer
  python_module: saq.modules.asset.active_directory
  python_class: ActiveDirectoryAnalyzer
  enabled: false

analysis_module_snort_signature_analysis_v1:
  name: snort_signature_analysis_v1
  # also see bin/update_snort_rules
  python_module: saq.modules.snort
  python_class: SnortSignatureAnalyzer_v1
  enabled: true
  # relative path to snort rules
  signature_path: data/snort/snort.rules

analysis_module_user_analyzer:
  name: user_analyzer
  python_module: saq.modules.user
  python_class: UserAnalyzer
  enabled: false

analysis_module_email_conversation_frequency_analyzer:
  name: email_conversation_frequency_analyzer
  python_module: saq.modules.email.fa
  python_class: EmailConversationFrequencyAnalyzer
  enabled: true
  # when two people email each other frequently we want to know that
  # this is the minimum number of times we've seen this email address email this other email address
  # that we consider to be "frequent"
  cooldown_period: 60
  conversation_count_threshold: 5

analysis_module_email_conversation_attachment_analyzer:
  name: email_conversation_attachment_analyzer
  python_module: saq.modules.email.fa
  python_class: EmailConversationAttachmentAnalyzer
  enabled: true

analysis_module_email_conversation_link_analyzer:
  name: email_conversation_link_analyzer
  python_module: saq.modules.email.fa
  python_class: EmailConversationLinkAnalyzer
  enabled: true

analysis_module_url_email_pivot_analyzer:
  name: url_email_pivot_analyzer
  python_module: saq.modules.email.correlation
  python_class: URLEmailPivotAnalyzer
  enabled: true
  # the maximum amount of results to download
  # if there are more emails, only the count is recorded
  result_limit: 35

analysis_module_email_logger:
  name: email_logger
  python_module: saq.modules.email.logging
  python_class: EmailLoggingAnalyzer
  enabled: true
  # this enabled an older style of logging suitable for a splunk heavy forwarder
  # if possible, use the JSON logger instead and send the logs to HEC
  splunk_log_enabled: false
  # the subdirectory inside of splunk_log_dir (see [splunk_logging]) that contains the logs
  splunk_log_subdir: smtp
  # this enabled updating the smtplog table of the brocess database
  # which is used for various heuristic-based phishing detections
  brocess_logging_enabled: true
  # this enables JSON logging to a file, suitable for any logging system that supports JSON
  json_logging_enabled: false

  # enabled logging directly to fluent-bit
  fluent_bit_logging_enabled: true
  # the hostname of the fluent-bit server
  fluent_bit_hostname: fluent-bit
  fluent_bit_port: 24224
  fluent_bit_tags: 
    main: phishfinder-main
    urls: phishfinder-urls
    headers: phishfinder-headers

  # JSON logging file path relative to DATA_DIR
  # the file name is passed through strftime
  # https://docs.python.org/3/library/datetime.html#strftime-strptime-behavior
  # {pid} (required) is replaced with the process ID of the current executing process
  # NOTE if you change this, you need to update your fluent-bit configuration as well
  json_log_path_format: logs/email/email-{pid}-%Y%m%d.log.json

analysis_module_file_hash_analyzer:
  name: file_hash_analyzer
  python_module: saq.modules.file_analysis.hash
  python_class: FileHashAnalyzer
  enabled: true
  # ignored file patterns (glob style pattern matching)
  ignore_pattern_pcap: "*.pcap"
  ignore_pattern_tshark: "*.tshark"
  ignore_pattern_brotex_1: "*.brotex.tar"
  ignore_pattern_brotex_2: "*.brotex.tar.gz"
  ignore_pattern_stderr: "*.stderr"
  ignore_pattern_stdout: "*.stdout"
  ignore_pattern_pdfparser: "*.pdfparser"
  ignore_pattern_stream: "*.stream"
  ignore_pattern_noxml: "*.noxml"
  ignore_pattern_ole: "*/ole.stdout.analysis"
  ignore_pattern_officeparser: "*.officeparser/*"
  # not sure why these were in there
  # ignore_pattern_olevba = *.olevba/*
  # ignore_pattern_vtdownload = */vt_downloads/*
  ignore_pattern_brotex_smtp_protocol: "*/protocol.smtp"
  ignore_pattern_brotex_http_protocol: "*/protocol.http"
  ignore_pattern_brotex_connection: "*/connection"
  # ignore_pattern_email = */email.rfc822
  ignore_pattern_email_headers: "*email.rfc822.headers"
  ignore_pattern_email_plain_text: "*email.rfc822.unknown_text_plain_*"
  ignore_pattern_email_combined: email.rfc822.combined
  ignore_pattenr_eml: "*.eml"
  ignore_pattenr_eml_extra: "*.eml.*"
  # Added on 06/10/21 in conjunction with disabling the ignore text/html mimetype setting to help cut down on noise
  ignore_pattern_email_html: "*.unknown_text_html_*"
  ignore_mime_type_xml: application/xml
  ignore_mime_type_text_xml: text/xml
  # Disabled on 06/10/21 so that we hash .wsf files (that have text/html mimetype)
  # ignore_mime_type_html = text/html
  ignore_mime_type_images: "image/*"
  ignore_mime_type_email: message/rfc822
  ignore_pattern_json: "*.json"
  ignore_pattern_extra_001: "*.crl"
  ignore_pattern_extra_002: "*/xl/drawings/*"
  ignore_pattern_extra_003: "*/xl/media/*"
  ignore_pattern_extra_004: "*/xl/printerSettings/*"
  ignore_pattern_extra_005: "*/xl/theme/*"
  ignore_pattern_extra_006: "*.rels"
  ignore_pattern_extra_007: "*/xl/vbaProject.bin"
  ignore_pattern_extra_008: "*.extracted/xl/*.bin"
  ignore_pattern_pdf_txt: "*.pdf.txt"
  ignore_pattern_olevba: "*.olevba/*.bas"
  ignore_pattern_pcode: "*.pcode.bas"
  ignore_pattern_phishkit: "phishkit/*"
  ignore_pattern_gs: "*.pdf.gs.pdf"
  ignore_pattern_ocr: "*.ocr"
  ignore_pattern_js_deobfuscated: "*/deobfuscated-*"

analysis_module_correlated_tag_analyzer:
  name: correlated_tag_analyzer
  python_module: saq.modules.tag
  python_class: CorrelatedTagAnalyzer
  enabled: false
  # powerpoint autoexec on mouse over to powershell
  definition_001_rule: ppt_mouse_over,ppt_program_action,ppt_powershell
  definition_001_text: openxml office document has mouseover event leading to powershell script

analysis_module_ssdeep:
  name: ssdeep
  python_module: saq.modules.file_analysis.ssdeep
  python_class: SsdeepAnalyzer
  enabled: false
  # the location of the ssdeep hashes to match against
  # generated using ssdeep files_to_hash > etc/ssdeep_hashes
  # NOTE - make sure this file doesn't use the characters :
  ssdeep_hashes: etc/ssdeep_hashes
  # maximum file size (in bytes)
  maximum_size: 2048000
  # minimum matching threshold (in percent) before the file is tagged as ssdeep
  ssdeep_match_threshold: 90

analysis_module_archive:
  name: archive
  python_module: saq.modules.file_analysis.archive
  python_class: ArchiveAnalyzer
  enabled: true
  # comma separated list of excluded mime types we do not want to extract
  excluded_mime_types: application/x-shockwave-flash,application/vnd.tcpdump.pcap,application/x-mach-binary
  # if an archive has more than max_file_count files then we do not analyze it
  # more attacks only have a single file inside the zip; avoid archives with thousands of files
  max_file_count: 6
  # use a different max file count for jar files
  max_jar_file_count: 30
  # the maximum amount of time (in seconds) to wait for 7z to complete
  # 7z can go nuts and consume all system memory, so this tries to prevent that
  timeout: 5
  # the archive analyzer also decompiles java class files (limit for number of class files)
  java_class_decompile_limit: 30

analysis_module_java_class_decompiler:
  name: java_class_decompiler
  python_module: saq.modules.file_analysis.java
  python_class: JavaClassDecompilerAnalysisModule
  enabled: true

  # the maximum amount of time (in seconds) to wait for the decompiler to complete
  timeout: 30

analysis_module_olevba_v1_2:
  name: olevba_v1_2
  python_module: saq.modules.file_analysis.olevba
  python_class: OLEVBA_Analyzer_v1_2
  enabled: true
  # if set to yes then all extracted macros are merged into a single file called macros.bas
  merge_macros: false
  # define the minimum thresholds required for a file to be tagged (alerted)
  # these are the "analysis types" as defined here (https://bitbucket.org/decalage/oletools/wiki/olevba)
  # format is threshold_analysis_type where analysis_type is lowercase name of analysis type
  threshold_autoexec: 1
  # threshold_ioc: 1
  threshold_suspicious: 1
  # amount of time to wait for the process to finish (in seconds)
  # if the process doesn't finish then we tag the file with olevba_failed
  timeout: 30

analysis_module_officeparser3:
  name: officeparser3
  python_module: saq.modules.file_analysis.officeparser3
  python_class: OfficeParserAnalyzer3
  enabled: true
  # path to the officeparser3 executable (required)
  officeparser_path: /venv/bin/officeparser3
  merge_macros: false
  # amount of time to wait for the process to finish (in seconds)
  # if the process doesn't finish then we tag the file with officeparser_failed
  timeout: 90

analysis_module_xlmdeobfuscator:
  name: xlmdeobfuscator
  python_module: saq.modules.file_analysis.xlm
  python_class: XLMMacroDeobfuscatorAnalyzer
  enabled: true
  # amount of time to wait for the process to finish (in seconds)
  # if the process doesn't finish then we tag the file with xlmdeobfuscator_failed
  timeout: 30
  # maximum size (in MB) of a file this module will process
  maximum_size_mb: 10
  # optional yara rule names that can trigger xlmdeobfuscator analysis
  # NOTE: these are YARA RULE NAMES, not the name of the yara file!!
  yara_rule_names:
    - Content_Types_Macrosheet
    - XLM_Macrosheet_NonBin
