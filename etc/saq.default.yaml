#            _____ ______ 
#      /\   / ____|  ____|
#     /  \ | |    | |__   
#    / /\ \| |    |  __|  
#   / ____ \ |____| |____ 
#  /_/    \_\_____|______|
#                         
# Analysis Correlation Engine
# 
# DEFAULT CONFIGURATION
# *** DO NOT EDIT THIS FILE UNLESS YOU ARE A DEVELOPER ***
# override this configuration by creating the file etc/saq.ini with the local configuration settings
# 
# Unless otherwise indicated, all file and directory paths should be relative to the 
# SAQ_HOME path (the directory where ACE is installed)

global:
  # the default company name and id to use for alerts generated by engines using this configuration file
  # SELECT * FROM company
  company_name: default
  company_id: 1
  # shows up in the GUI so you know which instance you're logged into
  instance_name: DEV
  # the name of this node, usually this is the fully qualified domain name
  # if this is set to AUTO then socket.getfqdn() is used
  # NOTE make sure this is actually a resolvable host name!
  node: AUTO
  # this can be either PRODUCTION, QA or DEV
  # used by some routines to prevent a user from making a horrible mistake
  # if this setting is missing then the default value taken is PRODUCTION
  instance_type: env:ACE_INSTANCE_TYPE
  # forces the entire application to run under a single thread
  debug: false
  # global data directory that has all the things (relative to SAQ_HOME)
  data_dir: data
  # analyst data directory that has files that analysts can control through an external git repository. these files can
  # then be used by analysis modules or collectors instead of needing to edit ACE config.
  analyst_data_dir: signatures/analyst_data
  # if you need to override the default temp directory, set this to the path
  # if the path is relative, it is relative to the SAQ_HOME directory
  #tmp_dir: /tmp/ace
  # directory for compiled hunt temp files (relative to DATA_DIR)
  # must be on a filesystem that allows execution (not a noexec tmpfs)
  compiled_hunt_dir: var/compiled_hunts
  # directory that contains any stack traces for review (relative to DATA_DIR)
  error_reporting_dir: error_reports
  # list of email addresses (comma separated) that get these reports sent to them automatically
  # you can leave this empty
  error_reporting_email: ace@localhost
  # the amount of time (in minutes) in between reporting of the same condition
  # set to 0 to disable condition reporting
  condition_reporting_delay: 480
  # comma separated list of local domains
  local_domains:
    - local
  # comma separated list of valid email domains
  # these are domains that you receive emails for
  # this is important for email scanning
  local_email_domains: []
  # set to yes to log all SQL commands executed by the server
  log_sql: false
  # set to yes to log all SQL commands and their execution time
  log_sql_exec_times: false
  # set this to True to enable semaphores
  # you'll definitely want this to be True in production settings
  enable_semaphores: true
  # set this to the total number of analysis engines (of any type) you have running
  global_engine_instance_count: 1
  # the number of days alerts set to IGNORE will last until they are deleted from the system
  ignore_days: 1
  # the number of days alerts set to FALSE_POSITIVE will last until they are reset
  fp_days: 30
  # distribute old alerts that are NOT part of an event to another node after N days
  # set this to 0 to disable
  distribute_days_old: 0
  # the node to distribute the alerts to
  # this will be equal to the "node" value of this config section on the target machine
  distribution_target: ""
  # when alerts are being processed they are locked for processing
  # if a process dies during process then a stale lock could linger
  # the amount of time a lock is considered valid (in MM:SS format)
  lock_timeout: "240:00"
  # amount of time (in seconds) between lock keep alive messages
  # or "how often do I update the lock_time field of the locks database while I've got the lock open?"
  lock_keepalive_frequency: 10
  # amount of time (in seconds) that we expect analysis to take, in general
  # we use this to warn ourselves that something might be wrong with logic in a module
  maximum_cumulative_analysis_warning_time: 120
  # amount of time (in seconds) to give analysis (in total) before we bail entirely
  maximum_cumulative_analysis_fail_time: 900
  # amount of time (in seconds) that we expect a single analysis module to take
  maximum_analysis_time: 60
  # how often (in seconds) modules check to see if watched files have been modified
  check_watched_files_frequency: 5
  # issue a warning when a worker process uses this much memory (in MB)
  memory_limit_warning: 2048
  # kill a worker when it uses this much memory (in MB)
  memory_limit_kill: 4096
  # this is the name of the database configuration SECTION (database_SECTION) we use to query for encrypted passwords
  # by default we use database_ace
  encrypted_passwords_db: ace
  # maximum allowed size in bytes for an analysis (JSON + size of file observables)
  # this is to prevent things like emails with tons of attachments from expanding into hundreds of gigabytes in size and using all available disk space
  # set this to 0 to disable this functionality
  maximum_analysis_disk_size: 0
  # per-type observable limits for a single root analysis
  # once a type's threshold is met, no more observables of that type can be added
  # types not listed here have no limit
  maximum_observable_count:
    file: 500
    url: 500
  # optional default proxy to use for all http/https requests
  # leave empty to not use a proxy at all
  default_proxy:

# directives that cannot be copied between observables via copy_directives_to
fixed_directives:
  - archive

# LLM settings
llm:
  # the embedding model to use for vectorization
  embedding_model: all-MiniLM-L6-v2

service_llm_embedding:
  name: llm_embedding
  python_module: saq.llm.embedding.service
  python_class: EmbeddingService
  description: LLM Embedding - embeds alerts into a vector space
  enabled: true

# cron settings
service_cron:
  name: cron
  python_module: saq.cron
  python_class: ACECronService
  description: ACE Cron Service - runs cron jobs
  enabled: true
  cron_config_path: etc/cron.yaml

# monitor settings
monitor:
  use_stdout: false
  use_stderr: false
  use_logging: false
  use_cache: false
  fluent_bit:
    hostname: fluent-bit
    port: 24224
    tag: monitoring
  definitions:
    - pattern: "database.pool.*"
      suppression_duration: 10
      dedup: true

rabbitmq:
  username: ace3
  password: file:/auth/passwords/rabbitmq
  host: rabbitmq
  port: 5672

storage:
  target: local
  base_dir: data/storage

# s3:
#   host: garagehq
#   port: 3900
#   access_key: file:/auth/passwords/garage-access-key
#   secret_key: file:/auth/passwords/garage-secret-key
#   # set to use SSL
#   secure: false
#   # set to validate SSL certification
#   cert_check: false
#   region: garage

# global redis settings
redis:
  name: default
  host: redis
  port: 6379
  username: ace3
  password: file:/auth/passwords/redis
  use_ssl: false
  #ssl_ca_path: /opt/ace/ssl/ca-chain.cert.pem

redis-local:
  name: local
  host: redis
  port: 6379
  username: ace3
  password: file:/auth/passwords/redis
  use_ssl: false
  #ssl_ca_path: /opt/ace/ssl/ca-chain.cert.pem

qdrant:
  url: https://qdrant:6333
  use_ssl: true
  ssl_ca_path: ssl/ca-chain.cert.pem
  api_key: file:/auth/passwords/qdrant
  # the collection name for ace3 alert data
  collection_alerts: ace3-alerts

# sqlite3 settings
sqlite3:
  # how long (in seconds) to wait for sqlite3 to connect
  # may have to make this value large on very busy systems
  timeout: 5

encryption:
  # size of the salt for PBKDF2 (in bytes)
  salt_size: 32
  # iterations for the PBKDF2 algorithm - the default is fine but if you're paranoid you can make it even larger
  # it just takes longer to compute
  iterations: 600000

collection:
  # contains various persistant information used by collectors (relative to DATA_DIR)
  persistence_dir: var/collection/persistence
  # some a submission is presented to the saq.collectors.Collector it moves
  # all the files attached to the submission into this directory
  # (relative to DATA_DIR)
  incoming_dir: var/collection/incoming
  # contains failed submission (relative to DATA_DIR)
  error_dir: var/collection/error
  # path (relative to SAQ_HOME) to directory that contains the yara rules used to tune collection
  # directories are specified by using the prefix tuning_dir_NAME where NAME is a unique name
  # see README.COLLECTION-TUNING
  tuning_dirs:
    - etc/collection/tuning
  tuning_dir_default: etc/collection/tuning (use service-specific YAML if needed)
  # path (relative to DATA_DIR) to use to store temporary file buffers for tuning
  # this should be a fast drive; defaults to tmp_dir set in the [global] section
  tuning_temp_dir: ""
  # control how often the tuning rules are checked for updates in HH:MM:SS format
  tuning_update_frequency: "00:01:00"
  # set to yes to force collection to use the API even if the target node is local
  force_api: false

# the default service configuration is none is provided
# XXX not sure we need this?
service_default:
  name: default
  python_module: saq.service
  python_class: DisabledService
  description: default unconfigured service
  enabled: true

service_email_collector:
  name: email_collector
  python_module: saq.collectors.email.scanner
  python_class: EmailCollectorService
  description: Email Collector (AMS) - collects emails from remote AMS systems
  enabled: true
  workload_type: email
  delete_files: true
  # contains the rules that assigns emails to collectors
  assignment_yara_rule_path: etc/remote_assignments.yar
  # any email that matches these rules are ignored
  blacklist_yara_rule_path: etc/blacklist.yar
  # how often do we check to see if the blacklist yara rule has changed (in SECONDS)
  blacklist_yara_rule_check_frequency: 10

service_journal_email_collector:
  name: journal_email_collector
  python_module: saq.collectors.email.journal
  python_class: JournalEmailCollectorService
  description: Journal Email Collector - collects journal emails from a local directory or S3 bucket
  enabled: true
  workload_type: journal
  # source type: local or s3
  source: local
  # local source settings
  source_directory: data/journal-emails
  delete_files: true
  # how often to poll for new emails (in seconds)
  collection_frequency: 5
  # s3 source settings (only used when source is s3)
  bucket_name: journal-emails
  delete_s3_objects: true
  # any email that matches these rules are ignored
  blacklist_yara_rule_path: etc/blacklist.yar
  # how often do we check to see if the blacklist yara rule has changed (in SECONDS)
  blacklist_yara_rule_check_frequency: 10

# ACE Services
service_hunter:
  name: hunter
  # ACE Hunter Collector
  python_module: saq.collectors.hunter
  python_class: HunterService
  description: Hunter - executes searches, queries and commands on external systems
  enabled: true
  delete_files: true
  workload_type: hunter
  # how often do we check to see if the hunts have been modified/updated (in SECONDS)
  update_frequency: 60

query_hunter:
  # global defaults for query-based hunts (like splunk, elasticsearch, qradar, etc...)
  # maximum number of results queries should return
  max_result_count: 100
  # maximum amount of time (in HH:MM:SS format) we should wait for a query to complete
  query_timeout: "00:30:00"

node_translation:
  # when ACE looks up a node to send something to, it does so using the nodes.location from the ace database
  # this value is populated by the node itself, typically using the name of the system (or via configuration file)
  # in some situations you may need to map this to another value (e.g., target node behind NAT)
  # format: key = source_host:source_port,target_host:target_port
  default: ace,ace-http:443

# this works the same way that node_translation does but it's only for the web application
# if the value used for the location field isn't actually what people are supposed to use
# this is used in the saq.gui.node_translate_gui function
node_translation_gui: {}

SSL:
  ca_chain_path: ssl/ca-chain.cert.pem

# Optional proxy configuration
#proxy_default:
#  name: default
#  transport: http
#  host: proxy.local
#  port: 3128
#  user:
#  password:
#  # additional proxy sections can be added and referred to by analysis modules that might use more than one

api:
  # this is the single threaded developer server API config
  # production uses apache configuration (see etc/ace_api_apache.conf)
  # binding address to incoming requests
  listen_address: 0.0.0.0
  listen_port: 443
  # ssl parameters (required)
  ssl_cert: ssl/ace.cert.pem
  ssl_key: ssl/ace.key.pem
  secret_key: file:/auth/keys/flask-secret-key
  # the default alert type when submissions do not include it
  default_alert_type: default
  # autogenerated api key used for node-to-node communication
  api_key: file:/auth/passwords/ace-api-key
  # the prefix that other systems use to connect to the API server for this system
  # https://PREFIX/api/analysis/etc...
  # if set to AUTO then the prefix will be simply socket.getfqdn() (which defaults to port 443)
  prefix: AUTO

apikeys:
  # automatically generated api key used for node-to-node communication
  automation: file:/auth/passwords/ace-api-key-sha256

# GUI configuration
gui:
  # this is the single threaded developer server GUI config
  # production uses apache configuration (see etc/saq_apache.conf)
  # binding address to incoming requests
  listen_address: 0.0.0.0
  listen_port: 5000
  # ssl parameters (required)
  ssl_cert: ssl/ace.cert.pem
  ssl_key: ssl/ace.key.pem
  # force users to authenticate to the gui, else everyone gets access
  authentication: true
  # which tabs should be displayed on the gui
  display_events: true
  display_metrics: true
  display_overview: true
  # Google Analytics for Public ACE
  # if true, expects $SAQ_HOME/app/templates/gtag.html to exist
  google_analytics: false
  # allow settings to be imported?
  settings_import_enabled: true
  # alert management features access through the GUI
  dispositioning: true
  ownership: true
  email_remediation: true
  event_management: true
  add_observable: true
  analyze_alert: true
  fp_easy_button: true
  ignore_easy_button: true
  upload_vt: true
  upload_vxstream: true
  view_in_vx: true
  # Allows analysts to clear cached URL content
  clear_cloudphish_alert: true
  # Show the total alerts resulting from the current filter.
  #  Ex: "Alert (22)" would say there are 22 alerts matching the filter.
  show_total_alert_count: true
  # Default Matching Open Events toggle position
  matching_open_events_collapsed: false
  # Default Alert Details toggle position
  alert_details_collapsed: false
  # Hide intel if we don't want to let people see it (public/internet ace)
  hide_intel: false
  # the base address for the GUI (used to build ACE permalinks)
  base_uri: https://localhost:5000/ACE
  # default company for manual analysis (the default option from the drop down)
  # 3 == integral
  default_company_id: 0
  # define what companies are "core" companies
  # these are the company IDs separated by commas
  core_companies:
    - 0
  # secret key used by flask
  secret_key: file:/auth/keys/flask-secret-key
  # comma separated list of observable types that are excluded from whitelisting
  whitelist_excluded_observable_types:
    - ipv4_full_conversation
    - yara_rule
    - indicator
    - snort_sig
  # specifies the number of bytes of read when generating previews for files
  # these are observables of type F_FILE that have the directive PREVIEW set
  file_preview_bytes: 512
  # by default we only show alerts that exist on the local node
  # if you've set up something with NFS you can set this to no and show alerts from any node
  local_node_only: true
  # enabling this option forces all observables in the root analysis to be visible in the critical analysis view
  show_root_observables: true
  # a comma separated list of navigation tables visible from this node
  # the available values are in saq.constants.GUI_TABS
  # the value of "all" indicates that all tabs should be visible
  navigation_tabs: all

# NOTE: we should just load this from the directory
# list of available alert favicons
# match attempted first on alert description, then alert tool (source)
# place favicon mappings under this section if needed
gui_favicons: {}

service_monitoring:
  name: monitoring
  python_module: saq.monitoring.service
  python_class: ACEMonitoringService
  description: Monitoring - system health and operational monitoring service
  enabled: true
  monitors:
    - name: distributed_workload
      python_module: saq.monitoring.monitors.distributed_workload_monitor
      python_class: DistributedWorkloadMonitor
      frequency: 5
    - name: distributed_delayed_analysis
      python_module: saq.monitoring.monitors.distributed_delayed_analysis_monitor
      python_class: DistributedDelayedAnalysisMonitor
      frequency: 5
    - name: distributed_locks
      python_module: saq.monitoring.monitors.distributed_locks_monitor
      python_class: DistributedLocksMonitor
      frequency: 5
    - name: local_workload
      python_module: saq.monitoring.monitors.local_workload_monitor
      python_class: LocalWorkloadMonitor
      frequency: 5

service_network_semaphore:
  name: network_semaphore
  python_module: saq.network_semaphore.service
  python_class: NetworkSemaphoreService
  description: Network Semaphore - global network service for controlling concurrent access to limited resources
  enabled: true
  # the address of the network semaphore server (used to bind and listen)
  # now that ACE is running in containers, this cannot bind on 127.0.0.1, or else the other containers
  # will not be able to reach the port
  bind_address: 0.0.0.0
  bind_port: 53559
  # the address of the network semaphore server to the clients that want to use them
  # now that ACE is running in containers, this is the hostname of the network-semaphore container
  remote_address: network-semaphore
  remote_port: 53559
  # comma separated list of source IP addresses that are allowed to connect
  # the code that blocks addresses not listed here is currently commented out
  allowed_ipv4:
    - 0.0.0.0
  # directory that contains metrics and current status of semaphores
  stats_dir: var/network_semaphore
  # SEMAPHORE CAPACITY LIMITS
  # each of these represents a resource and the number of simultaneous connections allowed to it
  semaphore_capacity_limits:
    pcap: 1

network_configuration:
  # this section defines what the managed network looks like
  # command separated list of CIDR notation for managed networks
  managed_networks:
    - 10.0.0.0/8
    - 192.168.0.0/16
    - 172.16.0.0/12

wiki:
  # This is designed to work with Confluence
  base_url: https://your.wiki.domain
  # If you want the Alert Type row to show a URL in the alert template that will take you to a wiki page
  # with documentation for that particular alert type. The link directs you to the search page and lists pages that
  # have the "playbook" label as well as the specially-formatted alert type as a label.
  # The alert type label on the wiki page must be the ACE alert type but with spaces removed and underscores instead of dashes.
  alert_reference_enabled: false
  # If you want the a wiki link next to the event names on the manage events page
  event_link_enabled: false

smtp:
  # smtp information for sending emails
  enabled: false
  server: localhost
  mail_from: ace@localhost

messaging:
  # how long (in seconds) a message can be locked before the lock times out
  # messages shouldn't take too long to dispatch so this should be kept fairly short
  lock_timeout: 60
  # how many requests to lock for dispatch at a single time
  batch_size: 10

message_routing: {}

nrd:
  # kill switch for the refresh script. When false, `python -m saq.nrd.refresh`
  # exits as a no-op before any DB or HTTP work, regardless of database age,
  # configured url_lists, etc. Does not affect the NRDAnalyzer (which is
  # toggled separately via analysis_module_nrd_analyzer.enabled below).
  enabled: true
  # local SQLite database that maps newly-registered domains for fast O(1) lookup
  # by NRDAnalyzer. Maintained by `python -m saq.nrd.refresh` (run via cron;
  # see etc/cron.yaml). Path is relative to SAQ_HOME unless absolute.
  database_path: data/external/nrd/nrd_index.db
  # minimum hours between successful upstream refreshes; once elapsed the
  # refresh script HEAD-checks every cron firing until upstream actually
  # changes (only an actual change resets this clock).
  check_interval_hours: 24
  # ordered list of upstream URL feeds to ingest. `backups` is optional; if a
  # primary URL fails the script falls through to backups in order.
  url_lists: []
  # example NRD lists:
  # url_lists:
  #   - url: "https://example.com/list1.txt"
  #     backups:
  #       - "https://backup.example.com/list1.txt"
  #   - url: "https://example.com/list2.txt"

email_archive:
  target: local # possible values: local, s3
  # if this system is archiving emails, this determines what section to use for the database config
  # NOTE this is the name of the section without the leading database_ (legacy issue)
  primary: email_archive

  # s3 settings
  # controls which section of the config to use for the s3 config
  s3_config: s3
  # the bucket to use for the email archive
  s3_bucket: ace-email-archive
  # the region to use for the email archive
  s3_region:

memcached:
  # the address of the memcached system used by ACE
  client_address: unix:var/memcached.socket

email:
  # the directory that contains the emails received by ACE for scanning
  # either via postfix or local email routing (not SMTP stream scanning)
  # (relative to DATA_DIR)
  email_dir: var/incoming/amc
  # the strftime format used to generate the subdirectory names that actually contain the emails
  # NOTE that INI used %% to escape; YAML uses normal % formatting here
  subdir_format: "%Y%m%d%H"

# database connections
# NOTE: unix_socket is typically /var/run/mysqld/mysqld.sock
# NOTE: keep password values as strings (e.g., env:ACE_DB_PASSWORD)
database_ace:
  name: ace
  hostname: ace-db
  port: 3306
  unix_socket: ""
  database: ace
  username: ace-user
  password: "env:ACE_DB_PASSWORD"
  ssl_ca: ssl/ca-chain.cert.pem
  # ssl_key, ssl_cert, ssl_ca can be added if needed
  max_allowed_packet: 1073741824
  # how long (in HH:MM:SS format) a database connecton is considered valid
  # connections that exceed this lifetime are terminated and recreated
  max_connection_lifetime: "00:15:00"

database_collection:
  name: collection
  hostname: ace-db
  port: 3306
  unix_socket: ""
  database: ace
  username: ace-user
  password: "env:ACE_DB_PASSWORD"
  ssl_ca: ssl/ca-chain.cert.pem
  max_allowed_packet: 1073741824
  # how long (in HH:MM:SS format) a database connecton is considered valid
  # connections that exceed this lifetime are terminated and recreated
  max_connection_lifetime: "00:15:00"

database_brocess:
  name: brocess
  hostname: ace-db
  port: 3306
  unix_socket: ""
  database: brocess
  username: ace-user
  password: "env:ACE_DB_PASSWORD"
  ssl_ca: ssl/ca-chain.cert.pem
  # how long do we wait for brocess queries to complete (in seconds)
  # these queries should complete super fast
  # failure to complete the timeout will send the analysis module using brocess into cooldown mode
  query_timeout: 5
  max_allowed_packet: 1073741824
  # how long (in HH:MM:SS format) a database connecton is considered valid
  # connections that exceed this lifetime are terminated and recreated
  max_connection_lifetime: "00:15:00"

database_email_archive:
  name: email_archive
  hostname: ace-db
  port: 3306
  unix_socket: ""
  database: email-archive
  username: ace-user
  password: "env:ACE_DB_PASSWORD"
  ssl_ca: ssl/ca-chain.cert.pem
  max_allowed_packet: 1073741824
  # how long (in HH:MM:SS format) a database connecton is considered valid
  # connections that exceed this lifetime are terminated and recreated
  max_connection_lifetime: "00:15:00"

ldap:
  # the LDAP server (probably your domain controller)
  ldap_server: ""
  # the port the LDAP server listens to (defaults to 389)
  ldap_port: 389
  # user account to use for authentication
  ldap_bind_user: ""
  # enter the LDAP password, or PROMPT to force the system to prompt
  ldap_bind_password: ""
  # the base DN for searching
  ldap_base_dn: ""
  # a user is tagged as executive if they are within 2 managers of this user
  top_user: ""

# general settings for logging intended for a splunk heavy forwarder
splunk_logging:
  # location of generated splunk logs (relative to DATA_DIR)
  splunk_log_dir: splunk_logs

sip:
  enabled: false
  remote_address: ""
  api_key: ""
  cache_db_path: var/sip.db

# settings for exporting for_detect observables into yara rules
yara_export:
  # a comma separated list of for_detect observables types to export to yara rules
  # NOTE: these map directly to observable type string representations!
  export_list:
    - email_address
    - email_body
    - email_subject
    - email_x_mailer
    - file_name
    - file_path
    - fqdn
    - ipv4
    - md5
    - sha256
    - uri_path
    - url
    - user_agent
  # directory of template files (relative to ANALYST_DATA_DIR)
  export_template_dir: yara_templates
  # minimum length of an indicator value that would go into a yara rule
  export_minimum_length: 5
  # max number of strings to allow in a yara rule
  max_strings_per_rule: 30720

# specifies what string modifiers to use per observable type
yara_export_string_modifiers:
  # see https://yara.readthedocs.io/en/v3.7.0/writingrules.html#text-strings
  # if an observable type has no mapping then the default setting is used
  default: ascii wide nocase
  fqdn: ascii wide nocase fullword
  file_name: ascii wide nocase fullword

# settings for exporting sip indicators into yara rules
sip_yara_export:
  # a comma separated list of sip indicator types to export to yara rules
  export_list:
