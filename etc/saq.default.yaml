# ENGINE CONFIGURATION
service_engine:
  name: engine
  python_module: saq.engine.core
  python_class: EngineService
  description: Analysis Correlation Engine - core analysis engine
  enabled: true
  # analysis pool settings
  # if NO analysis pools are specified then a single pool with no equal priority will be created with a size equal to the number of CPU cores
  analysis_pools: {}
  # analysis_pool_size_correlation = 8
  # analysis_pool_size_email = 8
  # in a multi-node configuration nodes are free to pull work from other nodes (target_nodes)
  # this setting is OPTIONAL and controls which nodes this node will pull work from
  # you can specify the special value of LOCAL to only pull work from the local node
  # target_nodes:
  #   - node1
  # how often to discard the worker processes and create new ones (in seconds) (disabled until restart issue resolved)
  auto_refresh_frequency: 0
  # the default analysis mode if none is specified, or an unknown analysis mode is specified
  default_analysis_mode: analysis
  # local/excluded analysis modes
  local_analysis_modes: []
  excluded_analysis_modes: []
  # the nodes database table keeps track of all the ace nodes that are currently available
  # this settings specifies how often (in seconds) we update the table with our current information
  node_status_update_frequency: 30
  # if this is set to yes then any analysis that fails is copied to a directory for review later (can take a lot of disk space)
  copy_analysis_on_error: false
  # if this is set to yes then any time an analysis module fails when analyzing a file, the engine will copy that file, along with details, to a directory for review
  copy_file_on_error: false
  # make copies of files analyzed by analysis modules that ended up timing out and getting killed by the worker manager (can take a lot of disk space)
  copy_terminated_analysis_causes: false
  # in some cases you might want your work to be performed on a different hard drive; if set then new non-alert analysis will be performed in this directory (relative to SAQ_HOME)
  #work_dir: data/work
  # when an analyst dispositions an alert ace will stop analyzing it if the alert is in correlation mode
  # this specifies how often ace checks the database for the disposition value (in seconds)
  alert_disposition_check_frequency: 5
  # a comma separated list of analysis modes that will NOT become alerts if detections are made (correlation, dispositioned, event)
  non_detectable_modes:
    - correlation
    - dispositioned
    - event
  # yes/no to stop any running analysis on an alert if it is dispositioned before the analysis completes
  stop_analysis_on_any_alert_disposition: true
  # A comma separated list of alert dispositions to trigger stopping any running analysis in the alert.
  stop_analysis_on_dispositions:
    - FALSE_POSITIVE
    - IGNORE
    - UNKNOWN
    - WEAPONIZATION
  # A comma separated list of analysis modes that should ignore the cumulative analysis timeout.
  analysis_modes_ignore_cumulative_timeout:
    - event
  # If this is set to yes then whenever an analysis times out completely it gets logged at the WARNING level instead of ERROR (useful in unstable environments)
  log_analysis_timeout_as_warning: false
  # By default alerting is enabled. If this is set to no then the engine will not check to see if an analysis should become an alert.
  alerting_enabled: true
  metrics_logging:
    # set this to false to disable metrics logging
    enabled: true
    # the hostname of the fluent-bit server
    fluent_bit_hostname: fluent-bit
    fluent_bit_port: 24224
    fluent_bit_tag: metrics

# COLLECTION GROUPS
# Defines where collectors send submissions to.
collection_group_default:
  name: default
  enabled: true
  coverage: 100
  full_delivery: true
  # NOTE this is what connects the collection_group to the nodes
  database: ace
  company_id: 1

#
# ANALYSIS MODES
# configures what analysis modules should run for the various analysis modes
#
analysis_mode_yara:
  name: yara
  module_groups:
    - yara
  cleanup: true

analysis_mode_email:
  name: email
  # mode used for email (rfc822 and SMTP stream) analysis
  module_groups:
    - common
    - file
    - email
  cleanup: true
  enabled_modules:
    - email_archiver
    - email_logger

analysis_mode_binary:
  name: binary
  # default mode for binary (executable) file analysis
  module_groups:
    - common
    - file
  cleanup: true

analysis_mode_file:
  name: file
  # mode used for generic file analysis
  module_groups:
    - common
    - file
  cleanup: true

analysis_mode_http:
  name: http
  # mode used for HTTP analysis
  module_groups:
    - common
    - file
  cleanup: true

analysis_mode_correlation:
  name: correlation
  # mode used for analyzing alerts
  module_groups:
    - common
    - file
    - email
    - correlation
    - action
  cleanup: false
  # NOTE once an analysis is set to correlation it automatically becomes an alert
  # analysis_module_detection: no

analysis_mode_analysis:
  name: analysis
  # default mode if none other is specified
  cleanup: true
  module_groups:
    - common
    - file
    - email
    - correlation

  name: cli
  # more of a debug mode, used by the command line correlate subcommand of the ace executable script
  module_groups:
    - common
    - file
    - email
    - correlation
  cleanup: false
  # analysis_module_alert_disposition_analyzer: no

analysis_mode_dispositioned:
  name: dispositioned
  # when an alert is dispositioned by an analyst, any current analysis stops and the mode is changed to dispositioned and re-analyzed
  # this gives certain analysis modules a chance to do something with the value of the disposition (limited list runs here)
  module_groups: []
  cleanup: false
  enabled_modules:
    - alert_added_to_event
  # faster cumulative timeouts for dispositioned mode

analysis_mode_event:
  name: event
  # mode used for when alerts are added to an event; allows more in-depth or time consuming analysis only for things inside of events
  module_groups: []
  cleanup: false

analysis_mode_suricata_ids:
  name: suricata_ids
  # used for suricata IDS detection of external attacks
  module_groups: []
  cleanup: true
  enabled_modules:
    - snort_signature_analysis_v1
    - pcap_conversation_extraction

integrations: {}

# settings for saq/domain_generator.py
domain_generation:
  # relative to saq.ANALYST_DATA_DIR
  keyword_file_path: certificates/keyword.txt
  # relative path to the opensquat external tool
  opensquat: /opt/misc/opensquat/opensquat.py
  # relative to saq.ANALYST_DATA_DIR
  static_domain_file: certificates/static_domains.txt

settings:
  refresh_seconds: 60

# yes/no to set any observables expires_on value to Null (never expire) if the observable is inside an event
# that has a threat actor assigned to it.
observable_expiration_mappings: {}
  #never_expire_with_threat_actor: true

# Events
# The event status that you use to indicate that the event is closed or fully processed. The status listed here will
# be hidden from the Edit Event window in the GUI and instead will have its own easy button in the header near the
# event name that will set the event status to what is listed here. This is because closing/finalizing an event needs
# to trigger some extra actions that are more easily controlled by having its own button that can control the process.
# However, if an event is already in the closed state, the closed status will be available in the Edit Event window.
# This allows you to edit other things with the event after the fact without needing to re-open and re-close it.
events:
  closed_status: CLOSED
  # file name that contains the autoclose criteria (path is relative to ANALYST_DATA_DIR)
  autoclose_path: autoclose-events.yml

