# you used to be able to just reach out the pull stuff down
# but the bad guys got smart and put themselves behind geo-blocking, recaptcha, cloudflare, etc...
#

analysis_module_crawlphish:
  name: crawlphish
  python_module: saq.modules.url.crawlphish
  python_class: CrawlphishAnalyzer
  enabled: false
  # path to whitelisted netloc
  whitelist_path: etc/crawlphish.whitelist
  # path to whitelisted path regexes
  regex_path: etc/crawlphish.path_regex
  # path to blacklisted netloc
  blacklist_path: etc/crawlphish.blacklist
  # threshold for uncommon networks (total connections threshold)
  uncommon_network_threshold: 70
  # the user-agent to send with requests
  user-agent: Mozilla/5.0 (Windows NT 6.2; WOW64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/27.0.1453.94 Safari/537.36
  # how long to wait (in full seconds) until a request is timed out
  timeout: 8
  # maximum file size (in MB)
  max_download_size: 10
  # maximum file name length of downloaded files (in bytes) file names are truncated past this value
  max_file_name_length: 50
  # how long do wait until we start trying to query brocess again? (in seconds)
  cooldown_period: 60
  # update the brocess database with requests made with crawlphish
  update_brocess: true
  # comma separate list of proxies to use. The special value GLOBAL refers to the global proxy settings (see [proxy])
  proxies: []
  # enable automatic crawlphish analysis for all url observables
  auto_crawl_all_alert_urls: false
  # filtering capabilities
  blacklist_filter_enabled: true
  whitelist_filter_enabled: true
  path_regex_filter_enabled: true
  common_filter_enabled: true
  intel_filter_enabled: true
  direct_ipv4_filter_enabled: true
  # set this to true to cache anything downloaded by crawlphish
  cache_downloaded_files: false
  # directory to store cached downloaded files into (relative to DATA_DIR)
  cache_directory: crawlphish_cache
  # path (relative to ANALYST_DATA_DIR) to file that contains all the user agents to use (one per line)
  user_agent_list_path: crawlphish_uas.txt

