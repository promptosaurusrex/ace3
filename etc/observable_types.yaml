# Built-in observable type metadata.
#
# Authoritative for descriptions, deprecated flags, default display types, and
# the inheritance hierarchy of the observable types ACE ships with. Migrated
# from constants.py (OBSERVABLE_DESCRIPTIONS / VALID_OBSERVABLE_TYPES /
# DEPRECATED_OBSERVABLES); F_* string identifiers stay in code, but everything
# else about each type lives here.
#
# Loaded by saq.observables.type_hierarchy.bootstrap_type_hierarchy at startup.
# The path is configured by observable_types.config_path in saq.default.yaml
# and defaults to this file. Production deployments may override config_path
# to a single file of their own; that file becomes the *only* one loaded, so
# include any entries from this file you still want.
#
# Schema is validated by saq.observables.type_hierarchy.ObservableTypesFile
# (Pydantic, extra fields rejected).
#
# Per-entry fields (all optional):
#   extends              -- parent observable type. Module dispatch treats this
#                           type as a subtype of the parent. Cycles rejected at
#                           load time.
#   default_display_type -- fallback label for Observable.display_type when no
#                           explicit value is set on the observable.
#   description          -- human-readable description, surfaced via the API.
#   deprecated           -- if true, the type is recognized but should not be
#                           offered to analysts in pickers/forms.

