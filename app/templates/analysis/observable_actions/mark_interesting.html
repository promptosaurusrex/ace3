<script type="text/javascript">
    $('#action_{{action.name}}_{{unique_reference}}').on('click', function() {
        var menuItem = $(this);
        $.ajax({
            url: '/api/v2/observables/interesting',
            type: 'PATCH',
            contentType: 'application/json',
            data: JSON.stringify({
                observable_type: '{{_observable.type}}',
                observable_value: decodeURIComponent(atob('{{_observable.value | b64escape}}')),
                is_interesting: true
            }),
            success: function(data) {
                // Show star badges on this observable (may appear multiple times in tree)
                $('[id="interesting_badge_{{_observable.uuid}}"]').show();

                // Add to the summary section
                var list = $('#interesting_observables_list');
                if ($('#interesting_item_{{_observable.uuid}}').length === 0) {
                    list.append(
                        '<li id="interesting_item_{{_observable.uuid}}">' +
                        '<a href="#{{_observable.uuid}}" style="text-decoration: none; color: inherit;">' +
                        '<span class="bi bi-star-fill" style="color: gold;"></span> ' +
                        '<b>{{_observable.display_type}}</b> : ' +
                        decodeURIComponent(atob('{{_observable.display_value | b64escape}}')) +
                        '</a></li>'
                    );
                }
                $('#interesting_observables_card').show();

                // Grey out the menu item to indicate it was applied
                menuItem.css({'opacity': '0.5', 'pointer-events': 'none'});
            },
            error: function(data) {
                alert('Failed to mark observable as interesting');
            }
        });
    });
</script>
